<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Reservas - Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-chat: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --msg-user: #3b82f6;
            --msg-agent: #334155;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: var(--bg-chat);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .chat-header {
            padding: 20px;
            background: rgba(30, 41, 59, 0.95);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(8px);
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-info h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .header-info p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out;
            white-space: pre-wrap;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.system {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            align-self: center;
            font-size: 12px;
            text-align: center;
            border-radius: 8px;
            padding: 8px 12px;
            max-width: 90%;
        }

        .message.user {
            background: var(--msg-user);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.agent {
            background: var(--msg-agent);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-input {
            padding: 20px;
            background: var(--bg-chat);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.5);
            color: white;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            padding: 0 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:disabled {
            background: var(--border);
            cursor: not-allowed;
            color: var(--text-muted);
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--msg-agent);
            padding: 12px 16px;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            gap: 4px;
            align-items: center;
        }

        .typing-indicator.active {
            display: flex;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <header class="chat-header">
            <div class="avatar">🏨</div>
            <div class="header-info">
                <h1>Chat Reservas</h1>
                <p>Booking Agent Online</p>
            </div>
        </header>

        <div class="chat-messages" id="messages">
        </div>
        
        <div class="typing-indicator" id="typing">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <form class="chat-input" id="chat-form">
            <input type="text" id="user-input" placeholder="Ex: Preciso de um voo LIS para JFK dia 20/05/2026..." autocomplete="off">
            <button type="submit" id="send-btn">Enviar</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');
        const messagesContainer = document.getElementById('messages');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing');

        // Generate a random ID for this tab session
        const sessionId = 'web-' + Math.random().toString(36).substring(2, 9);
        const myPhone = '+55_WEB_TEST';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            // 1. Add User Message UI
            appendMessage(text, 'user');
            input.value = '';
            
            // 2. Lock input & show typing
            input.disabled = true;
            sendBtn.disabled = true;
            typingIndicator.classList.add('active');
            scrollToBottom();

            try {
                // 3. Call local backend via the test endpoint
                const res = await fetch('/test/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        conversationId: sessionId,
                        customerPhone: myPhone,
                        message: text
                    })
                });

                if (!res.ok) throw new Error('API Error');

                const data = await res.json();
                
                // 4. Show AI Response UI
                typingIndicator.classList.remove('active');
                appendMessage(data.humanMessage, 'agent');

            } catch (err) {
                console.error(err);
                typingIndicator.classList.remove('active');
                appendMessage('Desculpe, ocorreu um erro de conexão com o servidor local. Verifique se a aplicação Node está rodando.', 'system');
            } finally {
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
                scrollToBottom();
            }
        });

        function appendMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            messagesContainer.appendChild(div);
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        input.focus();
    </script>
</body>
</html>
