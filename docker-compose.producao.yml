version: '3.8'

# ══════════════════════════════════════════════════════════════
#  AMBIENTE DE PRODUÇÃO
#  Usa o PostgreSQL externo já existente no servidor (porta 5432).
#  NÃO sobe container de postgres — aponta para o host via
#  variável POSTGRES_HOST definida no .env de produção.
# ══════════════════════════════════════════════════════════════

services:
  app:
    build: .
    container_name: chat_reservas_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Aponta para o postgres externo do servidor
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      - EVOLUTION_API_URL=http://evolution-api:8080
      - PORT=3000
    depends_on:
      redis:
        condition: service_started
      evolution-api:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Permite acessar o host a partir do container

  redis:
    image: redis:alpine
    container_name: chat_reservas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - DATABASE_PROVIDER=postgresql
      # Aponta para o postgres externo do servidor
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - CORS_ORIGIN=*
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1028355510
    depends_on:
      redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - evolution_instances:/evolution/instances

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=${TZ}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  redis_data:
  n8n_data:
  evolution_instances:
